services:
  mysql:
    image: mysql:8.4
    container_name: scm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: scm_auth
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - scm_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: scm-redis
    ports:
      - "16379:6379"
    volumes:
      - scm_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: scm-nacos
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
      NACOS_AUTH_TOKEN: 0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
    ports:
      - "18848:8848"
      - "19848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  kafka:
    image: bitnami/kafka:3.8
    container_name: scm-kafka
    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true
      ALLOW_PLAINTEXT_LISTENER: yes
    ports:
      - "19092:9092"
    volumes:
      - scm_kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10

  skywalking-oap:
    image: apache/skywalking-oap-server:10.2.0
    container_name: scm-skywalking-oap
    environment:
      SW_STORAGE: h2
      TZ: Asia/Shanghai
    ports:
      - "11800:11800"
      - "12800:12800"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:12800/healthCheck || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  skywalking-ui:
    image: apache/skywalking-ui:10.2.0
    container_name: scm-skywalking-ui
    depends_on:
      skywalking-oap:
        condition: service_started
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
      TZ: Asia/Shanghai
    ports:
      - "18080:8080"

volumes:
  scm_mysql_data:
  scm_redis_data:
  scm_kafka_data:
