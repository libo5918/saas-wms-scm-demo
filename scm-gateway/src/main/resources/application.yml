spring:
  application:
    name: scm-gateway
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 127.0.0.1:18848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      config:
        enabled: true
        server-addr: 127.0.0.1:18848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
        file-extension: yaml
        import-check:
          enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: auth
              uri: lb://scm-auth
              predicates:
                - Path=/api/v1/auth/**
            - id: sales
              uri: lb://scm-sales
              predicates:
                - Path=/api/v1/sales-orders/**,/api/v1/outbox/**
            - id: inventory
              uri: lb://scm-inventory
              predicates:
                - Path=/api/v1/inventory/**
            - id: mdm
              uri: lb://scm-mdm
              predicates:
                - Path=/api/v1/materials/**,/api/v1/warehouses/**,/api/v1/locations/**
auth:
  jwt:
    issuer: scm-auth
    secret: change-this-dev-secret-key-at-least-32-bytes
    expire-seconds: 7200
security:
  gateway:
    internal-secret: scm-gateway-internal-dev-secret
server:
  port: 18080
