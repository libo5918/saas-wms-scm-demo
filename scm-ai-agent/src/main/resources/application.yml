spring:
  application:
    name: scm-ai-agent
  ai:
    # 默认禁用真实 ChatModel，避免本地启动和单元测试依赖外部 API Key。
    # 真实 smoke test 时设置为 dashscope 或 openai。
    model:
      chat: ${AI_AGENT_SPRING_AI_MODEL_CHAT:none}
      embedding: ${AI_AGENT_SPRING_AI_MODEL_EMBEDDING:none}
      image: ${AI_AGENT_SPRING_AI_MODEL_IMAGE:none}
      audio:
        speech: ${AI_AGENT_SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${AI_AGENT_SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
      moderation: ${AI_AGENT_SPRING_AI_MODEL_MODERATION:none}
      rerank: ${AI_AGENT_SPRING_AI_MODEL_RERANK:none}
      video: ${AI_AGENT_SPRING_AI_MODEL_VIDEO:none}
    dashscope:
      enabled: ${AI_AGENT_DASHSCOPE_ENABLED:false}
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${AI_AGENT_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        enabled: ${AI_AGENT_DASHSCOPE_CHAT_ENABLED:false}
        api-key: ${DASHSCOPE_API_KEY:}
        base-url: ${AI_AGENT_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
        options:
          model: ${AI_AGENT_DASHSCOPE_CHAT_MODEL:qwen-plus}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${AI_AGENT_OPENAI_BASE_URL:https://api.openai.com}
      chat:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${AI_AGENT_OPENAI_BASE_URL:https://api.openai.com}
        options:
          model: ${AI_AGENT_OPENAI_CHAT_MODEL:gpt-4.1-mini}
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 127.0.0.1:18848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      config:
        enabled: true
        server-addr: 127.0.0.1:18848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
        file-extension: yaml
        import-check:
          enabled: false

server:
  port: 18087

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

security:
  gateway:
    enforce: false
    internal-secret: scm-gateway-internal-dev-secret

ai:
  agent:
    provider-mode: mock
    default-model: qwen-plus
    providers:
      - name: mock
        type: mock
        enabled: true
      - name: dashscope
        type: dashscope
        enabled: true
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key-env: DASHSCOPE_API_KEY
        timeout-ms: 30000
      - name: openai
        type: openai-compatible
        enabled: true
        base-url: https://api.openai.com/v1
        api-key-env: OPENAI_API_KEY
        timeout-ms: 30000
      - name: deepseek
        type: openai-compatible
        enabled: true
        base-url: https://api.deepseek.com
        api-key-env: DEEPSEEK_API_KEY
        timeout-ms: 30000
    models:
      - name: qwen-plus
        provider-model: qwen-plus
        provider: dashscope
        enabled: true
        cost-level: medium
        provider-modes: [mock, spring-ai]
        capabilities: [CHAT, RAG, TOOL_CALLING, STRUCTURED_OUTPUT]
        task-types: [simple_chat, rag_qa, tool_calling]
        fallback-models: [qwen-turbo, chatgpt-main]
        priority: 20
      - name: qwen-turbo
        provider-model: qwen-turbo
        provider: dashscope
        enabled: true
        cost-level: low
        provider-modes: [mock, spring-ai]
        capabilities: [CHAT, LOW_COST]
        task-types: [summary]
        fallback-models: [chatgpt-main]
        priority: 10
      - name: chatgpt-main
        provider-model: ${AI_OPENAI_CHAT_MODEL:gpt-4.1-mini}
        provider: openai
        enabled: true
        cost-level: high
        provider-modes: [mock, spring-ai]
        capabilities: [CHAT, TOOL_CALLING, STRUCTURED_OUTPUT, PLANNING, HIGH_QUALITY]
        task-types: [workflow_planning, complex_reasoning]
        fallback-models: [qwen-plus, deepseek-chat]
        priority: 30
      - name: deepseek-chat
        provider-model: deepseek-chat
        provider: deepseek
        enabled: true
        cost-level: medium
        provider-modes: [mock, spring-ai]
        capabilities: [CHAT, STRUCTURED_OUTPUT, PLANNING]
        task-types: [complex_reasoning, code_reasoning]
        fallback-models: [qwen-plus]
        priority: 40
