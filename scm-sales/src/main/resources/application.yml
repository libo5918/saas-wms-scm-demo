spring:
  application:
    name: scm-sales
  config:
    import: "optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/scm_sales?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: 123456
  kafka:
    bootstrap-servers: 127.0.0.1:9092,127.0.0.1:9093,127.0.0.1:9094
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 127.0.0.1:18848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      config:
        enabled: true
        server-addr: 127.0.0.1:18848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
        file-extension: yaml
        import-check:
          enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8
server:
  port: 18085
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/*.xml
knife4j:
  enable: true
integration:
  inventory:
    base-url: http://127.0.0.1:18084
  mdm:
    base-url: http://127.0.0.1:18082
outbox:
  publisher:
    enabled: true
    fixed-delay-ms: 5000
    fetch-limit: 100
    max-retries: 20
    retry-backoff-minutes: 1
compensation:
  pending-order:
    fixed-delay-ms: 60000
    timeout-minutes: 10
    limit: 100
    cooldown-minutes: 15
    max-events-per-order: 5
mq:
  topics:
    order-ship-requested: order.ship.requested.v1
    order-cancel-requested: order.cancel.requested.v1
    inventory-ship-result: inventory.ship.result.v1
    inventory-cancel-result: inventory.cancel.result.v1
    sales-inventory-result-dlq: sales.inventory.result.dlq.v1
  consumer-groups:
    sales-ship-result: scm-sales-ship-result-consumer
    sales-cancel-result: scm-sales-cancel-result-consumer
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
